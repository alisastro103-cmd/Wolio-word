<script>
  // Apply the saved theme early (before the body renders) so there is no flash effect,
  // and so the dark/light mode always stays consistent with the app.html page.

    try {
      var t = window.localStorage.getItem("wolioWord.theme.v1");
      if (t === "dark") document.documentElement.setAttribute("data-theme", "dark");
    } catch (e) {}
  })();
</script>

<style>
  ::selection{ background:transparent; color:inherit; }
  ::-moz-selection{ background:transparent; color:inherit; }

  @font-face{

    font-weight:600;
    font-style:normal;
    font-display:swap;
  }
  @font-face{
    font-family:"Atkinson Hyperlegible";

    src:url("fonts/atkinson-hyperlegible-700.woff2") format("woff2");
    font-weight:700;
    font-style:normal;
    font-display:swap;
  }

  *{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
    -webkit-touch-callout:none;
  }

  html{
    --bg:#ffffff;
    --grid:#eceef1;
    --fg-strong:#111318;
    --fg-muted:#59636e;
    --btn-fg:#ffffff;
    --btn-border:#111318;
    --shadow:rgba(17,19,24,0.15);
    --overlay-bg:rgba(13,17,23,0.45);
    --card-bg:#ffffff;
  }
  html[data-theme="dark"]{
    --bg:#0d1117;
    --grid:#1c2129;
    --fg-strong:#e6edf3;
    --fg-muted:#8b949e;
    --btn-fg:#0d1117;
    --btn-border:#e6edf3;
    --shadow:rgba(0,0,0,0.4);
    --overlay-bg:rgba(0,0,0,0.6);
    --card-bg:#161b22;
  }

  html,body{
    margin:0; padding:0;
    height:100%;
    height:100dvh;
    overflow:hidden;
    background:var(--bg);
    background-image:
      linear-gradient(to right, var(--grid) 1px, transparent 1px),
      linear-gradient(to bottom, var(--grid) 1px, transparent 1px);
    background-size: 48px 48px;
    font-family:"Atkinson Hyperlegible",-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans",Helvetica,Arial,sans-serif;
    color:var(--fg-strong);
  }

  /* Smooth transition when the page opens */
  body{
    opacity:0;
    transition:opacity .35s ease, background-color .25s ease, color .25s ease;
  }
  body.loaded{
    opacity:1;
  }

  .page{
    height:100%;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }

  .hero{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:clamp(10px,3vh,32px) clamp(16px,5vw,24px);
    gap:clamp(2px,1vh,8px);
    min-height:0;
    overflow:hidden;
  }

  .hero-logo{
    width:clamp(44px,9vh,96px);
    height:clamp(44px,9vh,96px);
    color:var(--fg-strong);
    margin-bottom:clamp(2px,1vh,8px);
    flex-shrink:0;
    opacity:0;
    transform:translateY(28px);
    transition:opacity .4s ease, transform .4s ease;
    transition-delay:.05s;
  }

  .hero-title{
    font-family:"Fraunces", Georgia, "Times New Roman", serif;
    font-weight:600;
    font-size:clamp(1.7rem, 4.5vh + 2vw, 3.4rem);
    letter-spacing:-0.01em;
    margin:0;
    line-height:1.05;
    color:var(--fg-strong);
  }

  .hero-underline{
    width:64px;
    height:2px;
    background:var(--fg-strong);
    margin:clamp(8px,2vh,18px) 0 clamp(8px,2vh,16px);
    border:none;
    flex-shrink:0;
  }

  .hero-tagline{
    font-size:clamp(0.82rem, 2vh, 1rem);
    color:var(--fg-muted);
    max-width:380px;
    min-height:clamp(2.6em,12vh,4.6em);
    line-height:1.5;
    margin:0 0 clamp(10px,2.5vh,32px);
    overflow:hidden;
  }

  .caret{
    display:inline-block;
    margin-left:1px;
    animation:blink 0.9s step-end infinite;
  }
  @keyframes blink{
    0%, 49%{ opacity:1; }
    50%, 100%{ opacity:0; }
  }

  .hero-actions{
    display:flex;
    flex-wrap:wrap;
    gap:clamp(8px,1.5vh,12px);
    justify-content:center;
    width:100%;
    max-width:420px;
    flex-shrink:0;
    opacity:0;
    transform:translateY(28px);
    transition:opacity .4s ease, transform .4s ease;
    transition-delay:.15s;
  }

  body.loaded .hero-logo,
  body.loaded .hero-actions{
    opacity:1;
    transform:translateY(0);
  }

  .btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    padding:12px 22px;
    border-radius:12px;
    text-decoration:none;
    font-size:0.95rem;
    font-weight:600;
    line-height:1.3;
    cursor:pointer;
    font-family:inherit;
    transition:transform .15s ease, box-shadow .15s ease, background-color .2s ease, color .2s ease, border-color .2s ease;
    flex:1 1 160px;
  }
  .btn:hover{ transform:translateY(-1px); }
  .btn svg{ flex-shrink:0; }

  .btn-primary{
    background:var(--fg-strong);
    color:var(--btn-fg);
    border:1px solid var(--fg-strong);
  }

  .btn-outline{
    background:var(--card-bg);
    color:var(--fg-strong);
    border:1px solid var(--btn-border);
    box-shadow:3px 3px 0 var(--shadow);
  }

  .btn-support{
    margin-top:12px;
    flex:1 1 100%;
    width:100%;
  }

  .site-footer{
    padding:clamp(8px,2vh,20px) 24px clamp(10px,2.5vh,28px);
    text-align:center;
    font-size:0.8rem;
    color:var(--fg-muted);
    flex-shrink:0;
  }
  .site-footer a{
    color:var(--fg-muted);
    text-decoration:underline;
  }
  .site-footer a:hover{ color:var(--fg-strong); }
  .site-footer .sep{ margin:0 8px; }
  .site-footer .footer-github{ display:inline-flex; align-items:center; gap:5px; vertical-align:middle; }
  .site-footer .footer-copyright{ margin-top:6px; font-size:0.75rem; opacity:0.75; }

<script>
  var AUTOSAVE_KEY = "wolioWord.autosave.v1";
  var importFileInput = document.getElementById("importFileInput");

  function loadAutosaveState(){
    try {
      var raw = window.localStorage.getItem(AUTOSAVE_KEY);
      var state = raw ? JSON.parse(raw) : null;
      if (!state || !Array.isArray(state.tabs)) return { version:1, tabs:[], tabIdSeq:1, activeTabId:null };
      return state;
    } catch (e){ return { version:1, tabs:[], tabIdSeq:1, activeTabId:null }; }
  }

  function hasUnsavedWork(state){
    return state.tabs.some(function(t){ return t.dirty; });
  }

  // Always keeps exactly ONE project in the workspace: any existing project
  // is replaced rather than adding a second tab. If the current project has
  // unsaved edits, the user is asked to confirm before it's discarded.
  function replaceProjectAndGo(filename, content){
    var state = loadAutosaveState();
    if (hasUnsavedWork(state)){
      var ok = window.confirm("You have unsaved changes in your current project. Discard them and continue?");
      if (!ok) return;
    }
    var id = 1;
    var newState = {
      version: 1,
      tabs: [{ id:id, filename:filename, content:content, mode:"edit", dirty:false, history:[], folder:null }],
      tabIdSeq: id + 1,
      activeTabId: id,
      savedAt: Date.now()
    };
    try { window.localStorage.setItem(AUTOSAVE_KEY, JSON.stringify(newState)); } catch (e){}
    window.location.href = "app.html";
  }

  document.getElementById("btnNewProject").addEventListener("click", function(){
    replaceProjectAndGo("unsaved.md", "");
  });

  /* Tutorial content is embedded here (mirrors CARA-PAKAI-MARKDOWN.md) so it
     opens instantly and still works when this page is run straight from disk
     (file://), where fetch() of local files is blocked by browsers. */
  var TUTORIAL_FILENAME = "CARA-PAKAI-MARKDOWN.md";
  var TUTORIAL_CONTENT = "# Cara Pakai Markdown di Wolio Word\n\nPanduan singkat sintaks Markdown yang didukung editor Wolio Word, lengkap dengan contoh. Tulis di panel **Editor**, lihat hasilnya langsung di panel **Review**.\n\n## Heading\n\n```\n# Judul 1\n## Judul 2\n### Judul 3\n```\n\nHeading otomatis muncul di panel **Daftar Isi** (ikon garis di activity bar).\n\n## Teks\n\n| Sintaks | Hasil |\n|---|---|\n| `**tebal**` | **tebal** |\n| `*miring*` | *miring* |\n| `***tebal miring***` | ***tebal miring*** |\n| `~~coret~~` | ~~coret~~ |\n| `` `kode inline` `` | `kode inline` |\n| `<kbd>Ctrl</kbd>` | tombol keyboard bergaya |\n\n## List\n\n```\n- Item satu\n- Item dua\n  - Sub-item\n\n1. Langkah pertama\n2. Langkah kedua\n\n- [ ] Belum selesai\n- [x] Sudah selesai\n```\n\n## Blockquote\n\n```\n> Ini kutipan.\n> Bisa nested juga:\n> > Kutipan di dalam kutipan.\n```\n\n## Kode blok (dengan syntax highlight + tombol salin)\n\n````\n```js\nfunction halo(nama) {\n  console.log(\"Halo, \" + nama);\n}\n```\n````\n\nGanti `js` dengan bahasa lain (`python`, `html`, `css`, dll) untuk highlight yang sesuai.\n\n## Tabel\n\n```\n| Nama | Peran |\n|---|---|\n| Randy | Developer |\n| Wolio Word | Editor |\n```\n\n## Link & Gambar\n\n```\n[Teks tautan](https://contoh.com \"judul opsional\")\n![Teks alternatif](gambar.png \"judul opsional\")\n```\n\nLink eksternal (`http/https`) otomatis dibuka di tab baru.\n\n## Garis pemisah\n\n```\n---\n```\n\n## Diagram Mermaid\n\n````\n```mermaid\ngraph TD\n  A[Mulai] --> B{Cek kondisi}\n  B -->|Ya| C[Lakukan aksi]\n  B -->|Tidak| D[Selesai]\n```\n````\n\n> Butuh koneksi internet **sekali** saat pertama kali dipakai (memuat library Mermaid dari CDN). Setelah itu bisa dipakai offline selama sesi browser masih terbuka. Kalau tidak ada internet sama sekali, kode diagramnya tetap ditampilkan sebagai teks biasa (fallback), tidak error.\n\n## Fitur editor pendukung\n\n- **Mode Editor / Review / Split** \u2014 tombol di kanan atas header.\n- **Command Palette** (`Ctrl+K`) \u2014 jalankan aksi cepat lewat pencarian.\n- **Cari & Ganti** (`Ctrl+F`) \u2014 ikon kaca pembesar di activity bar.\n- **Tab & multi-file** \u2014 buka beberapa dokumen sekaligus, tersimpan otomatis di browser (localStorage) \u2014 tidak hilang saat direfresh.\n- **Riwayat versi (checkpoint)** \u2014 simpan snapshot manual dari tab yang aktif lewat panel Files.\n- **Impor / Ekspor** \u2014 impor `.md` / `.txt`, ekspor sebagai `.md`, `.txt`, `.html` (mandiri, bisa dibuka standalone), atau `.pdf` (lewat dialog cetak browser).\n\n## Catatan\n\nWolio Word 100% berjalan offline di browser \u2014 tidak butuh server, tidak butuh instalasi. Cukup buka `index.html`.\n";

  document.getElementById("btnTutorial").addEventListener("click", function(){
    replaceProjectAndGo(TUTORIAL_FILENAME, TUTORIAL_CONTENT);
  });

  document.getElementById("btnImportProject").addEventListener("click", function(){
    importFileInput.value = ""; // reset so the same file can be selected again
    importFileInput.click();
  });

  importFileInput.addEventListener("change", function(){
    var file = importFileInput.files && importFileInput.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(){
      replaceProjectAndGo(file.name || "imported.md", reader.result != null ? reader.result : "");
    };
    reader.readAsText(file, "UTF-8");
  });

  /* ---- Typing effect on the tagline, with a blinking text cursor ---- */
  function typeWriter(el, text, speed){
    var i = 0;
    el.textContent = "";
    var caret = document.createElement("span");
    caret.className = "caret";
    caret.textContent = "|";
    el.appendChild(caret);
    (function step(){
      if (i < text.length){
        caret.insertAdjacentText("beforebegin", text.charAt(i));
        i++;
        setTimeout(step, speed);
      }
    })();
  }

  window.addEventListener("DOMContentLoaded", function(){
    document.body.classList.add("loaded");
    var taglines = [
      "Wolio Word makes writing markdown easy. Light, fast, and 100% offline in your browser — no install, no account, no hassle.",
      "Write Markdown as fast as you think. Wolio Word runs entirely in the browser, fully offline, no ads, no annoying accounts.",
      "A VS Code-style Markdown editor that fits in your pocket. Open, write, save — all offline.",
      "From quick drafts to polished docs, Wolio Word helps you write Markdown without the drama.",
      "No internet needed, no login required. Wolio Word is ready anytime, anywhere, on your phone or laptop.",
      "Markdown made fun: instant preview, dark/light theme, and everything saves automatically.",
      "One browser tab, everything you need to write clean, fast Markdown.",
      "Wolio Word: light as a notepad, complete as a code editor. Everything runs in your own browser.",
      "Ideas can strike anytime — Wolio Word is ready to catch them, no loading, no server, no drama."
    ];
    var tagline = taglines[Math.floor(Math.random() * taglines.length)];
    typeWriter(document.getElementById("heroTagline"), tagline, 24);
  });
</script>
