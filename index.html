<script>
  // Terapkan tema tersimpan lebih awal (sebelum body dirender) biar gak ada efek kedip,
  // dan biar mode gelap/terang selalu selaras dengan halaman app.html.
  (function(){
    try {
      var t = window.localStorage.getItem("wolioWord.theme.v1");
      if (t === "dark") document.documentElement.setAttribute("data-theme", "dark");
    } catch (e) {}
  })();
</script>

<style>
  ::selection{ background:transparent; color:inherit; }
  ::-moz-selection{ background:transparent; color:inherit; }

  @font-face{
    font-family:"Fraunces";
    src:url("fonts/fraunces-600.woff2") format("woff2");
    font-weight:600;
    font-style:normal;
    font-display:swap;
  }
  @font-face{
    font-family:"Atkinson Hyperlegible";
    src:url("fonts/atkinson-hyperlegible-400.woff2") format("woff2");
    font-weight:400;
    font-style:normal;
    font-display:swap;
  }
  @font-face{
    font-family:"Atkinson Hyperlegible";
    src:url("fonts/atkinson-hyperlegible-700.woff2") format("woff2");
    font-weight:700;
    font-style:normal;
    font-display:swap;
  }

  *{ box-sizing:border-box; }

  html{
    --bg:#ffffff;
    --grid:#eceef1;
    --fg-strong:#111318;
    --fg-muted:#59636e;
    --btn-fg:#ffffff;
    --btn-border:#111318;
    --shadow:rgba(17,19,24,0.15);
    --overlay-bg:rgba(13,17,23,0.45);
    --card-bg:#ffffff;
  }
  html[data-theme="dark"]{
    --bg:#0d1117;
    --grid:#1c2129;
    --fg-strong:#e6edf3;
    --fg-muted:#8b949e;
    --btn-fg:#0d1117;
    --btn-border:#e6edf3;
    --shadow:rgba(0,0,0,0.4);
    --overlay-bg:rgba(0,0,0,0.6);
    --card-bg:#161b22;
  }

  html,body{
    margin:0; padding:0;
    height:100%;
    height:100dvh;
    overflow:hidden;
    background:var(--bg);
    background-image:
      linear-gradient(to right, var(--grid) 1px, transparent 1px),
      linear-gradient(to bottom, var(--grid) 1px, transparent 1px);
    background-size: 48px 48px;
    font-family:"Atkinson Hyperlegible",-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans",Helvetica,Arial,sans-serif;
    color:var(--fg-strong);
  }

  /* Transisi halus saat halaman dibuka */
  body{
    opacity:0;
    transition:opacity .35s ease, background-color .25s ease, color .25s ease;
  }
  body.loaded{
    opacity:1;
  }

  .page{
    height:100%;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }

  .hero{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:clamp(10px,3vh,32px) clamp(16px,5vw,24px);
    gap:clamp(2px,1vh,8px);
    min-height:0;
    overflow:hidden;
  }

  .hero-logo{
    width:clamp(44px,9vh,96px);
    height:clamp(44px,9vh,96px);
    color:var(--fg-strong);
    margin-bottom:clamp(2px,1vh,8px);
    flex-shrink:0;
    opacity:0;
    transform:translateY(28px);
    transition:opacity .4s ease, transform .4s ease;
    transition-delay:.05s;
  }

  .hero-title{
    font-family:"Fraunces", Georgia, "Times New Roman", serif;
    font-weight:600;
    font-size:clamp(1.7rem, 4.5vh + 2vw, 3.4rem);
    letter-spacing:-0.01em;
    margin:0;
    line-height:1.05;
    color:var(--fg-strong);
  }

  .hero-underline{
    width:64px;
    height:2px;
    background:var(--fg-strong);
    margin:clamp(8px,2vh,18px) 0 clamp(8px,2vh,16px);
    border:none;
    flex-shrink:0;
  }

  .hero-tagline{
    font-size:clamp(0.82rem, 2vh, 1rem);
    color:var(--fg-muted);
    max-width:380px;
    min-height:clamp(2.6em,12vh,4.6em);
    line-height:1.5;
    margin:0 0 clamp(10px,2.5vh,32px);
    overflow:hidden;
  }

  .caret{
    display:inline-block;
    margin-left:1px;
    animation:blink 0.9s step-end infinite;
  }
  @keyframes blink{
    0%, 49%{ opacity:1; }
    50%, 100%{ opacity:0; }
  }

  .hero-actions{
    display:flex;
    flex-wrap:wrap;
    gap:clamp(8px,1.5vh,12px);
    justify-content:center;
    width:100%;
    max-width:420px;
    flex-shrink:0;
    opacity:0;
    transform:translateY(28px);
    transition:opacity .4s ease, transform .4s ease;
    transition-delay:.15s;
  }

  body.loaded .hero-logo,
  body.loaded .hero-actions{
    opacity:1;
    transform:translateY(0);
  }

  .btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    padding:12px 22px;
    border-radius:12px;
    text-decoration:none;
    font-size:0.95rem;
    font-weight:600;
    line-height:1.3;
    cursor:pointer;
    font-family:inherit;
    transition:transform .15s ease, box-shadow .15s ease, background-color .2s ease, color .2s ease, border-color .2s ease;
    flex:1 1 160px;
  }
  .btn:hover{ transform:translateY(-1px); }
  .btn svg{ flex-shrink:0; }

  .btn-primary{
    background:var(--fg-strong);
    color:var(--btn-fg);
    border:1px solid var(--fg-strong);
  }

  .btn-outline{
    background:var(--card-bg);
    color:var(--fg-strong);
    border:1px solid var(--btn-border);
    box-shadow:3px 3px 0 var(--shadow);
  }

  .btn-support{
    margin-top:12px;
    flex:1 1 100%;
    width:100%;
  }

  .site-footer{
    padding:clamp(8px,2vh,20px) 24px clamp(10px,2.5vh,28px);
    text-align:center;
    font-size:0.8rem;
    color:var(--fg-muted);
    flex-shrink:0;
  }
  .site-footer a{
    color:var(--fg-muted);
    text-decoration:underline;
  }
  .site-footer a:hover{ color:var(--fg-strong); }
  .site-footer .sep{ margin:0 8px; }

  /* ---- Modal konfirmasi proyek belum disimpan ---- */
  .confirm-overlay{
    position:fixed;
    inset:0;
    background:var(--overlay-bg);
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:20;
  }
  .confirm-overlay.open{ display:flex; }
  .confirm-box{
    background:var(--card-bg);
    color:var(--fg-strong);
    border-radius:14px;
    padding:22px;
    max-width:340px;
    width:100%;
    box-shadow:0 8px 30px var(--shadow);
    text-align:left;
  }
  .confirm-box h2{
    font-family:"Fraunces", Georgia, serif;
    font-size:1.15rem;
    margin:0 0 8px;
  }
  .confirm-box p{
    font-size:0.9rem;
    color:var(--fg-muted);
    margin:0 0 18px;
    line-height:1.5;
  }
  .confirm-actions{
    display:flex;
    gap:10px;
  }
  .confirm-actions button{
    flex:1;
    padding:10px 14px;
    border-radius:10px;
    font-size:0.9rem;
    font-weight:600;
    font-family:inherit;
    cursor:pointer;
    border:1px solid var(--btn-border);
  }
  .confirm-keep{
    background:var(--card-bg);
    color:var(--fg-strong);
  }
  .confirm-discard{
    background:var(--fg-strong);
    color:var(--btn-fg);
  }
</style>
</head>

<script>
  var AUTOSAVE_KEY = "wolioWord.autosave.v1";

  function hasUnsavedProject(){
    try {
      var raw = window.localStorage.getItem(AUTOSAVE_KEY);
      if (!raw) return false;
      var state = JSON.parse(raw);
      if (!state || !state.tabs) return false;
      return state.tabs.some(function(t){ return t && t.dirty; });
    } catch (e){ return false; }
  }

  function goToApp(action){
    try { window.localStorage.removeItem(AUTOSAVE_KEY); } catch (e){}
    window.location.href = "app.html?action=" + action;
  }

  var pendingAction = null;
  var confirmOverlay = document.getElementById("confirmOverlay");

  function askAndGo(action){
    if (hasUnsavedProject()){
      pendingAction = action;
      confirmOverlay.classList.add("open");
    } else {
      goToApp(action);
    }
  }

  document.getElementById("btnNewProject").addEventListener("click", function(){ askAndGo("new"); });
  document.getElementById("btnImportProject").addEventListener("click", function(){ askAndGo("import"); });
  document.getElementById("confirmDiscardBtn").addEventListener("click", function(){
    confirmOverlay.classList.remove("open");
    if (pendingAction) goToApp(pendingAction);
    pendingAction = null;
  });
  document.getElementById("confirmKeepBtn").addEventListener("click", function(){
    confirmOverlay.classList.remove("open");
    pendingAction = null;
  });
  confirmOverlay.addEventListener("click", function(e){
    if (e.target === confirmOverlay){
      confirmOverlay.classList.remove("open");
      pendingAction = null;
    }
  });

  /* ---- Efek ketik pada tagline, dengan kursor huruf yang berkedip ---- */
  function typeWriter(el, text, speed){
    var i = 0;
    el.textContent = "";
    var caret = document.createElement("span");
    caret.className = "caret";
    caret.textContent = "|";
    el.appendChild(caret);
    (function step(){
      if (i < text.length){
        caret.insertAdjacentText("beforebegin", text.charAt(i));
        i++;
        setTimeout(step, speed);
      }
    })();
  }

  window.addEventListener("DOMContentLoaded", function(){
    document.body.classList.add("loaded");
    var taglines = [
      "Membuat markdown menjadi mudah dengan Wolio Word. Ringan, cepat, dan 100% offline di browser kamu — tanpa install, tanpa akun, tanpa ribet.",
      "Nulis Markdown secepat mikir. Wolio Word jalan penuh di browser, offline total, tanpa iklan, tanpa akun ribet.",
      "Editor Markdown ala VS Code, tapi muat di saku kamu. Buka, tulis, simpan — semuanya offline.",
      "Dari draft cepat sampai dokumentasi rapi, Wolio Word bantu kamu nulis Markdown tanpa drama.",
      "Gak perlu internet, gak perlu login. Wolio Word siap dipakai kapan aja, di mana aja, di HP atau laptop kamu.",
      "Markdown jadi menyenangkan: preview instan, tema gelap/terang, dan semuanya tersimpan otomatis.",
      "Satu tab browser, semua yang kamu butuh buat nulis Markdown rapi dan cepat.",
      "Wolio Word: ringan kayak notepad, lengkap kayak editor kode. Semuanya berjalan di browser kamu sendiri.",
      "Ide muncul kapan aja — Wolio Word siap nampung, tanpa loading, tanpa server, tanpa drama."
    ];
    var tagline = taglines[Math.floor(Math.random() * taglines.length)];
    typeWriter(document.getElementById("heroTagline"), tagline, 24);
  });
</script>
