    <div id="historyFlyoutList"></div>
  </div>

  <div class="files-flyout" id="outlineFlyout">
    <div class="flyout-title">Table of Contents</div>
    <div id="outlineFlyoutList"></div>
  </div>
</header>

<div class="tabbar">
  <div class="tabstrip" id="tabStrip" role="tablist" aria-label="Project tabs"></div>
  <button id="newTabBtn" class="tab-add" title="New project tab">
    <svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true"><path d="M8 2.5v11M2.5 8h11"/></svg>
  </button>
</div>

<main id="mainArea">
  <section class="pane" id="paneEdit">
    <div class="pane-header">Editor — Markdown</div>
    <div class="find-bar" id="findBar">
      <input id="findInput" type="text" placeholder="Find..." spellcheck="false">
      <button id="findPrevBtn" class="icon-only" title="Previous">
        <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6l4-4 4 4"/></svg>
      </button>
      <button id="findNextBtn" class="icon-only" title="Next">
        <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6l4 4 4-4"/></svg>
      </button>
      <span class="find-count" id="findCount"></span>
      <input id="replaceInput" type="text" placeholder="Replace with..." spellcheck="false">
      <button id="replaceOneBtn">Replace</button>
      <button id="replaceAllBtn">Replace All</button>
      <button id="findCloseBtn" class="icon-only" title="Close">
        <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M3.5 3.5l9 9M12.5 3.5l-9 9"/></svg>
      </button>
    </div>
    <div class="pane-body" id="editorPaneBody">
      <textarea id="editor" spellcheck="false" placeholder="# Your document title

Write Markdown here... then click Review or Split to see the result."></textarea>
    </div>
  </section>

  <div class="pane-resizer" id="paneResizer" title="Drag to resize">
    <div class="pane-resizer-grip"></div>
  </div>

  <section class="pane" id="panePreview" style="display:none;">
    <div class="pane-header">Review — Rendered Output</div>
    <div class="pane-body">
      <div id="previewWrap">
        <article class="markdown-body" id="preview"></article>
      </div>
    </div>
  </section>
</main>

<footer>
  <span id="status">Ready.</span>
  <span class="footer-right">
    <span id="cursorPos">Line 1, Col 1</span>
    <span id="modeLabel">Editor</span>
    <span id="stats">0 lines · 0 words · 0 characters</span>
  </span>
</footer>

<div class="palette-overlay" id="paletteOverlay">
  <div class="palette-box" role="dialog" aria-label="Command Palette">
    <input id="paletteInput" type="text" placeholder="Type a command... (e.g. export, theme, split)" spellcheck="false" autocomplete="off">
    <div class="palette-list" id="paletteList"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
